<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — EduGenie</title>
<script>(function(){var t=localStorage.getItem('edugenie_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="auth-wrap page-fade-in">
  <div class="card auth-card" style="max-width:480px;">
    <a href="../index.html" class="logo"><span class="logo-mark">Eg</span>EduGenie</a>
    <h2 style="text-align:center;">Create your account</h2>
    <p style="text-align:center;margin-bottom:var(--space-lg);">Start learning with your personal AI assistant.</p>

    <form id="registerForm" novalidate>
      <div class="field">
        <label class="label" for="full_name">Full Name</label>
        <input class="input" type="text" id="full_name" name="full_name" required autocomplete="name">
        <div class="field-error" id="full_nameError"></div>
      </div>
      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" type="email" id="email" name="email" required autocomplete="email">
        <div class="field-error" id="emailError"></div>
      </div>
      <div class="field">
        <label class="label" for="academic_level">Academic Level</label>
        <select class="select" id="academic_level" name="academic_level" required>
          <option value="" disabled selected>Select your academic level</option>
          <option>School Student</option>
          <option>Intermediate / Higher Secondary</option>
          <option>Undergraduate</option>
          <option>Postgraduate</option>
          <option>Self Learner</option>
          <option>Educator</option>
        </select>
        <div class="field-error" id="academic_levelError"></div>
      </div>
      <div class="field">
        <label class="label" for="password">Password</label>
        <input class="input" type="password" id="password" name="password" required autocomplete="new-password">
        <div class="password-strength"><div class="password-strength-fill" id="strengthFill" style="width:0%;background:var(--color-border);"></div></div>
        <div class="field-hint" id="passwordHint">At least 8 characters, one uppercase letter, one number.</div>
      </div>
      <div class="field">
        <label class="label" for="confirm_password">Confirm Password</label>
        <input class="input" type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
        <div class="field-error" id="confirm_passwordError"></div>
      </div>
      <div class="field-error" id="formError" style="margin-bottom:var(--space-sm);"></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
        <span id="submitText">Create Account</span>
      </button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html" class="text-accent">Log in</a></p>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/theme.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
