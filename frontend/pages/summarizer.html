<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summarizer — EduGenie</title>
<script>(function(){var t=localStorage.getItem('edugenie_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="app-shell" id="app-shell-root"></div>

<template id="tpl-content">
  <div class="page-header">
    <div>
      <h2>Educational Text Summarizer</h2>
      <p>Paste your notes or textbook text to get a structured, exam-ready summary.</p>
    </div>
  </div>

  <div class="card" style="margin-bottom:var(--space-lg);">
    <form id="summaryForm">
      <div class="field">
        <div class="flex justify-between items-center">
          <label class="label" for="sourceText">Educational Text</label>
          <span class="field-hint" id="charCount">0 / 20,000 characters</span>
        </div>
        <textarea class="textarea" id="sourceText" style="min-height:220px;" placeholder="Paste your educational text here..." required></textarea>
      </div>
      <div class="grid grid-2">
        <div class="field">
          <label class="label">Summary Type</label>
          <div class="option-pills" id="typePills">
            <button type="button" class="option-pill active" data-val="Short Summary">Short Summary</button>
            <button type="button" class="option-pill" data-val="Detailed Notes">Detailed Notes</button>
            <button type="button" class="option-pill" data-val="Key Points">Key Points</button>
            <button type="button" class="option-pill" data-val="Exam Revision Notes">Exam Revision Notes</button>
          </div>
        </div>
        <div class="field">
          <label class="label">Detail Level</label>
          <div class="option-pills" id="levelPills">
            <button type="button" class="option-pill" data-val="Brief">Brief</button>
            <button type="button" class="option-pill active" data-val="Standard">Standard</button>
            <button type="button" class="option-pill" data-val="Detailed">Detailed</button>
          </div>
        </div>
      </div>
      <div class="flex gap-sm">
        <button type="submit" class="btn btn-primary" id="submitBtn">Summarize</button>
        <button type="button" class="btn btn-ghost" id="clearBtn">Clear</button>
      </div>
    </form>
  </div>

  <div id="resultContainer"></div>
</template>

<div id="toast-container"></div>

<script src="../js/theme.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/summarizer.js"></script>
</body>
</html>
