<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — EduGenie</title>
<script>(function(){var t=localStorage.getItem('edugenie_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="auth-wrap page-fade-in">
  <div class="card auth-card">
    <a href="../index.html" class="logo"><span class="logo-mark">Eg</span>EduGenie</a>
    <h2 style="text-align:center;">Welcome back</h2>
    <p style="text-align:center;margin-bottom:var(--space-lg);">Log in to continue your learning journey.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" type="email" id="email" name="email" required autocomplete="email">
        <div class="field-error" id="emailError"></div>
      </div>
      <div class="field">
        <label class="label" for="password">Password</label>
        <input class="input" type="password" id="password" name="password" required autocomplete="current-password">
        <div class="field-error" id="passwordError"></div>
      </div>
      <div class="field-error" id="formError" style="margin-bottom:var(--space-sm);"></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
        <span id="submitText">Log In</span>
      </button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="register.html" class="text-accent">Create one</a></p>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/theme.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
