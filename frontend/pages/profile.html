<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — EduGenie</title>
<script>(function(){var t=localStorage.getItem('edugenie_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="app-shell" id="app-shell-root"></div>

<template id="tpl-content">
  <div class="page-header"><div><h2>Profile</h2><p>Manage your personal information.</p></div></div>

  <div class="grid grid-2">
    <div class="card">
      <div class="flex items-center gap-sm" style="margin-bottom:var(--space-lg);">
        <div class="avatar" style="width:56px;height:56px;font-size:var(--fs-lg);" data-user-initials></div>
        <div>
          <h3 style="margin-bottom:2px;" data-user-name></h3>
          <p class="text-faint" style="margin:0;" data-user-email></p>
        </div>
      </div>
      <form id="profileForm">
        <div class="field">
          <label class="label" for="full_name">Full Name</label>
          <input class="input" id="full_name" required>
        </div>
        <div class="field">
          <label class="label" for="academic_level">Academic Level</label>
          <select class="select" id="academic_level">
            <option>School Student</option>
            <option>Intermediate / Higher Secondary</option>
            <option>Undergraduate</option>
            <option>Postgraduate</option>
            <option>Self Learner</option>
            <option>Educator</option>
          </select>
        </div>
        <p class="field-hint">Account created: <span id="createdAt"></span></p>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
      </form>
    </div>

    <div class="card">
      <h3>Your stats</h3>
      <div class="stat-grid" style="grid-template-columns:1fr 1fr;" id="statGrid">
        <div class="stat-card"><div class="skeleton" style="height:36px;"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:36px;"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:36px;"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:36px;"></div></div>
      </div>
    </div>
  </div>
</template>

<div id="toast-container"></div>

<script src="../js/theme.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/profile.js"></script>
</body>
</html>
