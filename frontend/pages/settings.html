<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — EduGenie</title>
<script>(function(){var t=localStorage.getItem('edugenie_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="app-shell" id="app-shell-root"></div>

<template id="tpl-content">
  <div class="page-header"><div><h2>Settings</h2><p>Personalize how EduGenie works for you.</p></div></div>

  <div class="card" style="max-width:560px;">
    <div class="field">
      <label class="label">Theme</label>
      <div class="option-pills" id="themePills">
        <button type="button" class="option-pill" data-val="light">☀️ Light</button>
        <button type="button" class="option-pill" data-val="dark">🌙 Dark</button>
      </div>
    </div>
    <div class="field">
      <label class="label" for="explanationStyle">Preferred Explanation Style</label>
      <select class="select" id="explanationStyle">
        <option>Simple</option>
        <option>Detailed</option>
        <option>Step-by-Step</option>
        <option>Real-Life Example</option>
        <option>Exam-Oriented</option>
      </select>
    </div>
    <div class="field">
      <label class="label" for="quizDifficulty">Quiz Difficulty Preference</label>
      <select class="select" id="quizDifficulty">
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>
    </div>
    <button class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
  </div>
</template>

<div id="toast-container"></div>

<script src="../js/theme.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/settings.js"></script>
</body>
</html>
