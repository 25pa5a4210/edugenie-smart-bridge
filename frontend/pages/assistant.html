<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant — EduGenie</title>
<script>(function(){var t=localStorage.getItem('edugenie_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="app-shell" id="app-shell-root"></div>

<template id="tpl-content">
  <div class="page-header">
    <div>
      <h2>AI Assistant</h2>
      <p>Ask any educational question — EduGenie adapts to your academic level.</p>
    </div>
    <button class="btn btn-secondary btn-sm" id="newChatBtn">+ New Chat</button>
  </div>

  <div class="card chat-shell">
    <div class="suggested-questions" id="suggestedQuestions">
      <button class="option-pill" data-q="What is the largest ocean?">What is the largest ocean?</button>
      <button class="option-pill" data-q="Explain photosynthesis in simple terms">Explain photosynthesis</button>
      <button class="option-pill" data-q="What is normalization in DBMS?">Normalization in DBMS?</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="state-block">
        <div class="state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 18h.01M9.5 9a2.5 2.5 0 015 0c0 1.5-2 2-2.5 3.5M12 3a9 9 0 100 18 9 9 0 000-18z"/></svg></div>
        <h4>Ask your first question</h4>
        <p>EduGenie is ready to help you understand any topic.</p>
      </div>
    </div>
    <form id="chatForm" class="chat-input-row">
      <textarea class="textarea" id="chatInput" placeholder="Ask an educational question..." rows="1" required></textarea>
      <button type="submit" class="btn btn-primary" id="sendBtn">Send</button>
    </form>
  </div>
</template>

<div id="toast-container"></div>

<script src="../js/theme.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/assistant.js"></script>
</body>
</html>
